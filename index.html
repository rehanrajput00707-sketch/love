<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💖 Secret Garden · Romantic Chat Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Quicksand', 'Poppins', 'Cantarell', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fbe9f0 0%, #ffd9e5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        .leaves-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .leaf {
            position: absolute;
            top: -20px;
            pointer-events: none;
            opacity: 0.7;
            animation: fall linear forwards;
            z-index: 1001;
            font-size: 1.8rem;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
        }

        .app-container {
            width: 100%;
            max-width: 680px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.5);
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .screen { padding: 2rem 1.8rem; }

        .lock-screen {
            background: rgba(255, 245, 250, 0.9);
            text-align: center;
        }

        .romantic-icon {
            font-size: 4.2rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.1));
            animation: gentleFloat 3s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .lock-screen h2 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #b83b5e, #e26a7a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .lock-screen p { color: #a55c6e; margin-bottom: 1.8rem; font-weight: 500; }

        .password-box {
            background: white;
            border-radius: 60px;
            padding: 0.2rem 1rem;
            display: flex;
            align-items: center;
            border: 1px solid #f7bfcf;
            box-shadow: 0 6px 14px rgba(0,0,0,0.03);
            margin-bottom: 1rem;
        }

        .password-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1.1rem;
            padding: 1rem 0.5rem;
            background: transparent;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .password-box input::placeholder { color: #e2b1bf; font-weight: 400; }

        .show-toggle {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.5rem;
            color: #d4748c;
        }

        button {
            background: linear-gradient(98deg, #e4577b, #f08c9e);
            border: none;
            padding: 0.9rem 1.8rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 3rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
        }

        button:hover {
            transform: scale(0.97);
            background: linear-gradient(98deg, #c94b6d, #dc7a8c);
        }

        .error-msg {
            color: #d6405a;
            font-size: 0.85rem;
            margin-top: 0.7rem;
            font-weight: 500;
            min-height: 2rem;
        }

        .chat-screen {
            display: flex;
            flex-direction: column;
            height: 85vh;
            max-height: 680px;
            background: rgba(255, 248, 250, 0.85);
            backdrop-filter: blur(4px);
        }

        .chat-header {
            background: #ffebf0;
            padding: 1rem 1.5rem;
            border-bottom: 2px solid #ffd0de;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chat-header h3 { font-size: 1.3rem; font-weight: 600; color: #b13e5c; }
        .chat-header h3 span { font-size: 1.2rem; }

        .logout-btn {
            background: rgba(180,70,100,0.2);
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            width: auto;
            color: #a53e5c;
            box-shadow: none;
            border-radius: 40px;
        }

        .logout-btn:hover { background: #e2a1b5; color: white; }

        .who-selector {
            background: #fff0f5;
            padding: 0.6rem 1.2rem;
            border-bottom: 1px solid #ffdae3;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 0.82rem;
            color: #a55c6e;
            font-weight: 600;
        }

        .who-selector label {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
        }

        .who-selector input[type="radio"] {
            accent-color: #e4577b;
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(74, 222, 128, 0.15);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .message {
            max-width: 80%;
            padding: 0.7rem 1rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeSlideUp 0.2s ease;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.me {
            background: #e4577b;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0.5rem;
            box-shadow: 0 4px 12px rgba(228,87,123,0.2);
        }

        .message.other {
            background: #ffffffea;
            color: #2d2f36;
            border: 1px solid #ffccd9;
            align-self: flex-start;
            border-bottom-left-radius: 0.5rem;
        }

        .message small {
            display: block;
            font-size: 0.65rem;
            margin-top: 5px;
            opacity: 0.75;
            letter-spacing: 0.3px;
        }

        .me small { text-align: right; color: #ffe2ea; }
        .other small { color: #b97b8b; }

        .input-panel {
            background: white;
            padding: 1rem 1.2rem 1.2rem;
            border-top: 1px solid #ffdae3;
            display: flex;
            gap: 0.7rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-panel input {
            flex: 1;
            border: 1px solid #f5bfce;
            border-radius: 60px;
            padding: 0.8rem 1.2rem;
            font-size: 0.95rem;
            outline: none;
            background: #fffbfd;
        }

        .input-panel input:focus {
            border-color: #e4577b;
            box-shadow: 0 0 0 2px #ffe0e8;
        }

        .input-panel button {
            width: auto;
            padding: 0.8rem 1.6rem;
            font-size: 0.9rem;
        }

        .clear-chat {
            background: rgba(228,87,123,0.2);
            color: #b83b5e;
            width: auto;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
        }

        .footer-actions { display: flex; gap: 0.5rem; }

        @media (max-width: 520px) {
            .input-panel { flex-direction: column; align-items: stretch; }
            .input-panel button { width: 100%; }
            .footer-actions { flex-direction: column; }
            .message { max-width: 90%; }
            .who-selector { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="leaves-container" id="leavesContainer"></div>
<div class="app-container" id="appRoot"></div>

<script>
    // ===== REAL-TIME ROMANTIC CHAT with BroadcastChannel (Works across tabs!) =====
    
    // Storage keys
    const STORAGE_KEY = "romantic_chat_messages";
    const PASSWORD_KEY = "romantic_vault_password";
    const DEFAULT_PASSWORD = "cherish2026";
    
    // Broadcast channel for real-time sync across tabs
    let broadcastChannel = null;
    
    // Leaves animation
    let leafInterval = null;
    const leafEmojis = ['🍂', '🍁', '🌸', '🌺', '💕', '💖', '🌹', '🍃', '✨', '💗'];
    
    function createLeaf() {
        const container = document.getElementById('leavesContainer');
        if (!container) return;
        const leaf = document.createElement('div');
        leaf.className = 'leaf';
        leaf.textContent = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
        leaf.style.left = (Math.random() * 100) + '%';
        const dur = 6 + Math.random() * 9;
        const delay = Math.random() * 5;
        leaf.style.animationDuration = dur + 's';
        leaf.style.animationDelay = delay + 's';
        leaf.style.fontSize = (1.2 + Math.random() * 1.2) + 'rem';
        leaf.style.opacity = 0.4 + Math.random() * 0.5;
        container.appendChild(leaf);
        setTimeout(() => leaf.remove(), (dur + delay) * 1000);
    }
    
    function startLeaves() {
        if (leafInterval) clearInterval(leafInterval);
        for (let i = 0; i < 8; i++) setTimeout(() => createLeaf(), i * 300);
        leafInterval = setInterval(createLeaf, 1800);
    }
    
    // Message storage
    function loadMessages() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        try {
            const msgs = JSON.parse(raw);
            return Array.isArray(msgs) ? msgs : [];
        } catch(e) { return []; }
    }
    
    function saveMessages(messages) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        // Broadcast to other tabs
        if (broadcastChannel) {
            broadcastChannel.postMessage({ type: 'UPDATE', timestamp: Date.now() });
        }
    }
    
    function addMessage(text, sender) {
        if (!text || text.trim() === "") return false;
        const messages = loadMessages();
        const newMsg = {
            id: Date.now() + Math.random() * 10000,
            text: text.trim(),
            sender: sender,
            timestamp: new Date().toISOString(),
            timeStr: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };
        messages.push(newMsg);
        saveMessages(messages);
        return true;
    }
    
    function clearAllMessages() {
        saveMessages([]);
    }
    
    // Password system
    function getStoredPassword() {
        const pwd = localStorage.getItem(PASSWORD_KEY);
        if (pwd === null) {
            localStorage.setItem(PASSWORD_KEY, DEFAULT_PASSWORD);
            return DEFAULT_PASSWORD;
        }
        return pwd;
    }
    
    function verifyPassword(entered) {
        return entered === getStoredPassword();
    }
    
    function isSessionUnlocked() {
        return sessionStorage.getItem("romantic_unlocked") === "true";
    }
    
    function setSessionUnlocked(flag) {
        if (flag) sessionStorage.setItem("romantic_unlocked", "true");
        else sessionStorage.removeItem("romantic_unlocked");
    }
    
    function changePassword(newPwd) {
        if (!newPwd || newPwd.trim().length < 4) {
            alert("💕 Password must be at least 4 romantic characters.");
            return false;
        }
        localStorage.setItem(PASSWORD_KEY, newPwd.trim());
        alert("✨ New secret password saved!");
        return true;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    function msgHTML(msg) {
        const timeDisplay = msg.timeStr || new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const isMe = msg.sender === 'me';
        return `<div class="message ${isMe ? 'me' : 'other'}">
            ${escapeHtml(msg.text)}
            <small>${timeDisplay} ${isMe ? '💗 you' : '💖 my love'}</small>
        </div>`;
    }
    
    const rootEl = document.getElementById("appRoot");
    let currentRefreshCallback = null;
    
    // Lock Screen
    function renderLockScreen(errorMsg = "") {
        startLeaves();
        rootEl.innerHTML = `
            <div class="screen lock-screen">
                <div class="romantic-icon">🔐💌🌹🍂</div>
                <h2>Secret Love Garden</h2>
                <p>Enter the romantic password to unlock our whispers</p>
                <div class="password-box">
                    <input type="password" id="pwdInput" placeholder="✦ your secret key ✦" autocomplete="off">
                    <button class="show-toggle" id="togglePwdView">👁️</button>
                </div>
                <button id="unlockBtn">Unlock the heart ❤️</button>
                <div class="error-msg" id="lockError">${errorMsg}</div>
                <p style="margin-top: 1.2rem; font-size: 0.75rem; color:#bc8f9b;">💕 password: cherish2026</p>
            </div>
        `;
        
        const pwdInput = document.getElementById("pwdInput");
        const unlockBtn = document.getElementById("unlockBtn");
        const toggleBtn = document.getElementById("togglePwdView");
        
        const attemptUnlock = () => {
            if (verifyPassword(pwdInput.value)) {
                setSessionUnlocked(true);
                renderChatScreen();
            } else {
                const errDiv = document.getElementById("lockError");
                if (errDiv) errDiv.innerText = "💔 Wrong password, my love. Try again...";
                pwdInput.value = "";
                pwdInput.focus();
            }
        };
        
        unlockBtn.addEventListener("click", attemptUnlock);
        pwdInput.addEventListener("keypress", (e) => e.key === "Enter" && attemptUnlock());
        
        let visible = false;
        toggleBtn.addEventListener("click", () => {
            visible = !visible;
            pwdInput.type = visible ? "text" : "password";
            toggleBtn.textContent = visible ? "🙈" : "👁️";
        });
        pwdInput.focus();
    }
    
    // Chat Screen with REAL-TIME BroadcastChannel
    function renderChatScreen() {
        startLeaves();
        
        // Setup broadcast channel for real-time sync
        if (broadcastChannel) {
            try { broadcastChannel.close(); } catch(e) {}
        }
        broadcastChannel = new BroadcastChannel('romantic_chat_sync');
        broadcastChannel.onmessage = (event) => {
            if (event.data.type === 'UPDATE') {
                // Refresh messages when another tab updates
                if (currentRefreshCallback) currentRefreshCallback();
            }
        };
        
        const savedWho = sessionStorage.getItem("romantic_who") || "me";
        
        rootEl.innerHTML = `
            <div class="chat-screen">
                <div class="chat-header">
                    <h3>🌙 Whisper & Petals <span>🍂🍁</span></h3>
                    <div style="display: flex; gap: 8px;">
                        <button id="changePwdBtn" class="logout-btn" style="background:#ffe0e8;">🔐 New Key</button>
                        <button id="logoutBtn" class="logout-btn">🔒 Lock Vault</button>
                    </div>
                </div>
                <div class="who-selector">
                    <div class="status-badge">
                        <span class="status-dot"></span>
                        <span>✨ Real-time · Live Sync</span>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <label><input type="radio" name="who" value="me" ${savedWho === 'me' ? 'checked' : ''}> 💗 Send as You</label>
                        <label><input type="radio" name="who" value="other" ${savedWho === 'other' ? 'checked' : ''}> 💖 Send as Lover</label>
                    </div>
                </div>
                <div class="messages-area" id="chatMessagesContainer">
                    <div style="text-align:center; padding: 2rem; color:#cb7a8f;">✨ Loading romantic whispers... ✨</div>
                </div>
                <div class="input-panel">
                    <input type="text" id="msgInput" placeholder="✍️ Write your romantic note..." autocomplete="off">
                    <button id="sendBtnMe">💌 Send</button>
                    <div class="footer-actions">
                        <button id="clearChatBtn" class="clear-chat">🗑️ Clear all memories</button>
                    </div>
                </div>
                <div style="font-size:0.7rem; text-align:center; padding:8px; background:#fff0f5; color:#b4687e;">
                    💕 Real-time across all devices/tabs — every word blooms instantly.
                </div>
            </div>
        `;
        
        const messagesContainer = document.getElementById("chatMessagesContainer");
        const msgInput = document.getElementById("msgInput");
        const sendBtn = document.getElementById("sendBtnMe");
        const clearBtn = document.getElementById("clearChatBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const changePwdBtn = document.getElementById("changePwdBtn");
        
        // Save who am I
        document.querySelectorAll('input[name="who"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.checked) sessionStorage.setItem("romantic_who", e.target.value);
            });
        });
        
        // Refresh display function
        const refreshMessages = () => {
            const messages = loadMessages();
            if (!messagesContainer) return;
            
            if (messages.length === 0) {
                messagesContainer.innerHTML = `<div style="text-align:center; padding: 2rem; color:#cb7a8f;">✨ No sweet words yet... write something romantic ✨</div>`;
                return;
            }
            
            messagesContainer.innerHTML = messages.map(msg => msgHTML(msg)).join('');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        };
        
        // Store callback for real-time updates
        currentRefreshCallback = refreshMessages;
        
        // Send message
        const sendMessage = () => {
            const rawText = msgInput.value;
            if (!rawText.trim()) {
                msgInput.style.transform = "translateX(4px)";
                setTimeout(() => { if(msgInput) msgInput.style.transform = ""; }, 150);
                return;
            }
            
            const whoValue = document.querySelector('input[name="who"]:checked')?.value || "me";
            addMessage(rawText, whoValue);
            msgInput.value = "";
            refreshMessages();
            msgInput.focus();
        };
        
        sendBtn.addEventListener("click", sendMessage);
        msgInput.addEventListener("keypress", (e) => e.key === "Enter" && sendMessage());
        
        clearBtn.addEventListener("click", () => {
            if (confirm("💔 Clear ALL romantic messages? This cannot be undone.")) {
                clearAllMessages();
                refreshMessages();
            }
        });
        
        logoutBtn.addEventListener("click", () => {
            if (broadcastChannel) {
                broadcastChannel.close();
                broadcastChannel = null;
            }
            setSessionUnlocked(false);
            renderLockScreen("");
        });
        
        changePwdBtn.addEventListener("click", () => {
            let newPwd = prompt("💖 New password (min 4 chars):");
            if (newPwd && newPwd.trim().length >= 4) {
                changePassword(newPwd.trim());
            } else if (newPwd !== null) {
                alert("💕 Password must be at least 4 characters.");
            }
        });
        
        // Initial load
        refreshMessages();
        
        // Polling fallback for older browsers (every 2 seconds as backup)
        const pollingInterval = setInterval(() => {
            if (messagesContainer && document.body.contains(messagesContainer)) {
                refreshMessages();
            } else {
                clearInterval(pollingInterval);
            }
        }, 2000);
        
        // Store interval for cleanup
        window.currentPolling = pollingInterval;
    }
    
    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
        if (broadcastChannel) broadcastChannel.close();
        if (window.currentPolling) clearInterval(window.currentPolling);
    });
    
    // Start app
    startLeaves();
    if (isSessionUnlocked()) {
        renderChatScreen();
    } else {
        renderLockScreen("");
    }
</script>
</body>
</html>
