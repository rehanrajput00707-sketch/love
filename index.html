<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💖 Secret Garden · Romantic Chat Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Quicksand', 'Poppins', 'Cantarell', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fbe9f0 0%, #ffd9e5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        .leaves-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .leaf {
            position: absolute;
            top: -20px;
            pointer-events: none;
            opacity: 0.7;
            animation: fall linear forwards;
            z-index: 1001;
            font-size: 1.8rem;
        }

        @keyframes fall {
            0%   { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
        }

        .app-container {
            width: 100%;
            max-width: 680px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.5);
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .screen { padding: 2rem 1.8rem; }

        .lock-screen {
            background: rgba(255, 245, 250, 0.9);
            text-align: center;
        }

        .romantic-icon {
            font-size: 4.2rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.1));
            animation: gentleFloat 3s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-8px); }
        }

        .lock-screen h2 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #b83b5e, #e26a7a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .lock-screen p { color: #a55c6e; margin-bottom: 1.8rem; font-weight: 500; }

        .password-box {
            background: white;
            border-radius: 60px;
            padding: 0.2rem 1rem;
            display: flex;
            align-items: center;
            border: 1px solid #f7bfcf;
            box-shadow: 0 6px 14px rgba(0,0,0,0.03);
            margin-bottom: 1rem;
        }

        .password-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1.1rem;
            padding: 1rem 0.5rem;
            background: transparent;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .password-box input::placeholder { color: #e2b1bf; font-weight: 400; }

        .show-toggle {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.5rem;
            color: #d4748c;
        }

        button {
            background: linear-gradient(98deg, #e4577b, #f08c9e);
            border: none;
            padding: 0.9rem 1.8rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 3rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
        }

        button:hover {
            transform: scale(0.97);
            background: linear-gradient(98deg, #c94b6d, #dc7a8c);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .error-msg {
            color: #d6405a;
            font-size: 0.85rem;
            margin-top: 0.7rem;
            font-weight: 500;
            min-height: 2rem;
        }

        .chat-screen {
            display: flex;
            flex-direction: column;
            height: 85vh;
            max-height: 680px;
            background: rgba(255, 248, 250, 0.85);
            backdrop-filter: blur(4px);
        }

        .chat-header {
            background: #ffebf0;
            padding: 1.2rem 1.8rem;
            border-bottom: 2px solid #ffd0de;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .chat-header h3 { font-size: 1.5rem; font-weight: 600; color: #b13e5c; letter-spacing: -0.3px; }
        .chat-header h3 span { font-size: 1.3rem; }

        .logout-btn {
            background: rgba(180,70,100,0.2);
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            width: auto;
            color: #a53e5c;
            box-shadow: none;
            border-radius: 40px;
        }

        .logout-btn:hover { background: #e2a1b5; color: white; transform: scale(0.96); }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .message {
            max-width: 80%;
            padding: 0.7rem 1rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeSlideUp 0.2s ease;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.me {
            background: #e4577b;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0.5rem;
            box-shadow: 0 4px 12px rgba(228,87,123,0.2);
        }

        .message.other {
            background: #ffffffea;
            color: #2d2f36;
            border: 1px solid #ffccd9;
            align-self: flex-start;
            border-bottom-left-radius: 0.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .message small { display: block; font-size: 0.65rem; margin-top: 5px; opacity: 0.75; letter-spacing: 0.3px; }
        .me small { text-align: right; color: #ffe2ea; }
        .other small { color: #b97b8b; }

        /* WHO AM I selector */
        .who-selector {
            background: #fff0f5;
            padding: 0.6rem 1.2rem;
            border-bottom: 1px solid #ffdae3;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.82rem;
            color: #a55c6e;
            font-weight: 600;
        }

        .who-selector label { display: flex; align-items: center; gap: 0.3rem; cursor: pointer; }
        .who-selector input[type="radio"] { accent-color: #e4577b; }

        .input-panel {
            background: white;
            padding: 1rem 1.2rem 1.2rem;
            border-top: 1px solid #ffdae3;
            display: flex;
            gap: 0.7rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-panel input {
            flex: 1;
            border: 1px solid #f5bfce;
            border-radius: 60px;
            padding: 0.8rem 1.2rem;
            font-size: 0.95rem;
            outline: none;
            background: #fffbfd;
            transition: 0.2s;
        }

        .input-panel input:focus { border-color: #e4577b; box-shadow: 0 0 0 2px #ffe0e8; }
        .input-panel button { width: auto; padding: 0.8rem 1.6rem; font-size: 0.9rem; }

        .clear-chat {
            background: rgba(228,87,123,0.2);
            color: #b83b5e;
            width: auto;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
        }

        .footer-actions { display: flex; gap: 0.5rem; margin-top: 0.2rem; }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #4ade80;
            display: inline-block;
            margin-right: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @media (max-width: 520px) {
            .input-panel { flex-direction: column; align-items: stretch; }
            .input-panel button { width: 100%; }
            .footer-actions { flex-direction: column; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
<div class="leaves-container" id="leavesContainer"></div>
<div class="app-container" id="appRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ===== SUPABASE CONFIG =====
    const SUPABASE_URL = "https://azkeqhuraapgqalltfhi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_qMygHXF7A7jIEUEUNPzM4Q_n39KtCPv";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ===== PASSWORD =====
    const PASSWORD_KEY = "romantic_vault_password";
    const DEFAULT_PASSWORD = "cherish2026";

    // ===== LEAVES =====
    let leafInterval = null;
    const leafEmojis = ['😍','♥','🧡','❤','💕','💖','🌸'];

    function createLeaf() {
        const container = document.getElementById('leavesContainer');
        if (!container) return;
        const leaf = document.createElement('div');
        leaf.className = 'leaf';
        leaf.textContent = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
        leaf.style.left = (Math.random() * 100) + '%';
        const dur = 6 + Math.random() * 9;
        const delay = Math.random() * 5;
        leaf.style.animationDuration = dur + 's';
        leaf.style.animationDelay = delay + 's';
        leaf.style.fontSize = (1.2 + Math.random() * 1.2) + 'rem';
        leaf.style.opacity = 0.4 + Math.random() * 0.5;
        container.appendChild(leaf);
        setTimeout(() => leaf.remove(), (dur + delay) * 1000);
    }

    function startLeaves() {
        if (leafInterval) clearInterval(leafInterval);
        for (let i = 0; i < 8; i++) setTimeout(() => createLeaf(), i * 300);
        leafInterval = setInterval(createLeaf, 1800);
    }

    // ===== PASSWORD HELPERS =====
    function getPassword() {
        return localStorage.getItem(PASSWORD_KEY) || DEFAULT_PASSWORD;
    }

    function isUnlocked() {
        return sessionStorage.getItem("romantic_unlocked") === "true";
    }

    function setUnlocked(v) {
        v ? sessionStorage.setItem("romantic_unlocked","true") : sessionStorage.removeItem("romantic_unlocked");
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    // ===== RENDER =====
    const root = document.getElementById("appRoot");
    let realtimeChannel = null;

    function renderLock(err = "") {
        startLeaves();
        root.innerHTML = `
            <div class="screen lock-screen">
                <div class="romantic-icon">🔐💌🍂</div>
                <h2>Secret Love Garden</h2>
                <p>Enter the romantic password to unlock our whispers</p>
                <div class="password-box">
                    <input type="password" id="pwdInput" placeholder="✦ your secret key ✦" autocomplete="off">
                    <button class="show-toggle" id="togglePwd">👁️</button>
                </div>
                <button id="unlockBtn">Unlock the heart ❤️</button>
                <div class="error-msg">${err}</div>
                <p style="margin-top:1.2rem;font-size:0.75rem;color:#bc8f9b;">💕 hint: cherish2026</p>
            </div>`;

        const inp = document.getElementById("pwdInput");
        const btn = document.getElementById("unlockBtn");
        const tog = document.getElementById("togglePwd");
        let vis = false;

        const tryUnlock = () => {
            if (inp.value === getPassword()) {
                setUnlocked(true);
                renderChat();
            } else {
                document.querySelector('.error-msg').innerText = "💔 Wrong password, my love. Try again...";
                inp.value = ""; inp.focus();
            }
        };

        btn.addEventListener("click", tryUnlock);
        inp.addEventListener("keypress", e => e.key === "Enter" && tryUnlock());
        tog.addEventListener("click", () => {
            vis = !vis;
            inp.type = vis ? "text" : "password";
            tog.textContent = vis ? "🙈" : "👁️";
        });
        inp.focus();
    }

    async function renderChat() {
        startLeaves();

        // جو user کھولے وہ پوچھیں کہ کون ہے
        const savedWho = sessionStorage.getItem("romantic_who") || "me";

        root.innerHTML = `
            <div class="chat-screen">
                <div class="chat-header">
                    <h3>🌙 Whisper & Petals <span>🍂🍁</span></h3>
                    <div style="display:flex;gap:8px;">
                        <button id="changePwdBtn" class="logout-btn" style="background:#ffe0e8;">🔐 New Key</button>
                        <button id="logoutBtn" class="logout-btn">🔒 Lock</button>
                    </div>
                </div>
                <div class="who-selector">
                    <span><span class="status-dot"></span>Live</span>
                    میں ہوں:
                    <label><input type="radio" name="who" value="me" ${savedWho==='me'?'checked':''}> 💗 You</label>
                    <label><input type="radio" name="who" value="other" ${savedWho==='other'?'checked':''}> 💖 My Love</label>
                </div>
                <div class="messages-area" id="msgArea">
                    <div style="text-align:center;color:#cb7a8f;padding:1rem;">⏳ Loading messages...</div>
                </div>
                <div class="input-panel">
                    <input type="text" id="msgInput" placeholder="✍️ Write your romantic note..." autocomplete="off">
                    <button id="sendBtn">💌 Send</button>
                    <div class="footer-actions">
                        <button id="clearBtn" class="clear-chat">🗑️ Clear all</button>
                    </div>
                </div>
                <div style="font-size:0.7rem;text-align:center;padding:8px;background:#fff0f5;color:#b4687e;">
                    💕 Messages sync live across all devices — love stays forever.
                </div>
            </div>`;

        // who radio save
        document.querySelectorAll('input[name="who"]').forEach(r => {
            r.addEventListener('change', () => sessionStorage.setItem("romantic_who", r.value));
        });

        // messages load
        await loadMessages();

        // realtime subscribe
        if (realtimeChannel) supabase.removeChannel(realtimeChannel);
        realtimeChannel = supabase
            .channel('messages-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                appendMessage(payload.new);
            })
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, () => {
                loadMessages();
            })
            .subscribe();

        // send
        const sendMsg = async () => {
            const inp = document.getElementById("msgInput");
            const text = inp.value.trim();
            if (!text) { inp.style.transform="translateX(4px)"; setTimeout(()=>inp.style.transform="",150); return; }
            const who = document.querySelector('input[name="who"]:checked')?.value || "me";
            inp.value = "";
            const { error } = await supabase.from('messages').insert({ text, sender: who });
            if (error) alert("❌ Error: " + error.message);
            inp.focus();
        };

        document.getElementById("sendBtn").addEventListener("click", sendMsg);
        document.getElementById("msgInput").addEventListener("keypress", e => e.key === "Enter" && sendMsg());

        document.getElementById("clearBtn").addEventListener("click", async () => {
            if (confirm("💔 Clear ALL messages? Love is eternal but these words will go...")) {
                await supabase.from('messages').delete().neq('id', 0);
                loadMessages();
            }
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            if (realtimeChannel) supabase.removeChannel(realtimeChannel);
            setUnlocked(false);
            renderLock();
        });

        document.getElementById("changePwdBtn").addEventListener("click", () => {
            const p = prompt("💖 New password (min 4 chars):");
            if (p && p.trim().length >= 4) {
                localStorage.setItem(PASSWORD_KEY, p.trim());
                alert("✨ Password saved!");
            }
        });
    }

    async function loadMessages() {
        const area = document.getElementById("msgArea");
        if (!area) return;
        const { data, error } = await supabase.from('messages').select('*').order('timestamp', { ascending: true });
        if (error) { area.innerHTML = `<div style="color:red;padding:1rem;">❌ ${error.message}</div>`; return; }
        if (!data || data.length === 0) {
            area.innerHTML = `<div style="text-align:center;padding:2rem;color:#cb7a8f;">✨ No sweet words yet... write something romantic ✨</div>`;
            return;
        }
        area.innerHTML = data.map(m => msgHTML(m)).join('');
        area.scrollTop = area.scrollHeight;
    }

    function appendMessage(msg) {
        const area = document.getElementById("msgArea");
        if (!area) return;
        const empty = area.querySelector('div[style*="text-align:center"]');
        if (empty) area.innerHTML = '';
        area.insertAdjacentHTML('beforeend', msgHTML(msg));
        area.scrollTop = area.scrollHeight;
    }

    function msgHTML(msg) {
        const time = new Date(msg.timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        const isMe = msg.sender === 'me';
        return `<div class="message ${isMe ? 'me' : 'other'}">
            ${escapeHtml(msg.text)}
            <small>${time} ${isMe ? '💗 you' : '💖 my love'}</small>
        </div>`;
    }

    // ===== INIT =====
    startLeaves();
    isUnlocked() ? renderChat() : renderLock();
</script>
</body>
</html>
